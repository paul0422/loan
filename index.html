<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>🏠</text></svg>" />
  <title>🧮 주담대 계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input:focus, select:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    @media (max-width: 960px) {
      .loan-grid { grid-template-columns: 1fr !important; }
    }
    /* 카카오 애드핏 광고 영역 */
    .ad-footer {
      width: 100%;
      padding: 20px 12px 28px;
      text-align: center;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
    }
    .ad-pc { display: inline-block; }
    .ad-mobile { display: none; }
    @media (max-width: 767px) {
      .ad-pc { display: none !important; }
      .ad-mobile { display: inline-block; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 카카오 애드핏 광고 -->
  <div class="ad-footer">
    <ins class="kakao_ad_area ad-pc" style="display:none;"
         data-ad-unit="DAN-HX9bfOQPZsFtvu1i"
         data-ad-width="728"
         data-ad-height="90"></ins>
    <ins class="kakao_ad_area ad-mobile" style="display:none;"
         data-ad-unit="DAN-TPSBOFwnI3qKHtTt"
         data-ad-width="320"
         data-ad-height="100"></ins>
  </div>
  <script>
    (function () {
      var isMobile = window.innerWidth <= 767;
      var el = document.querySelector(isMobile ? '.ad-pc' : '.ad-mobile');
      if (el) el.remove();
    })();
  </script>
  <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
